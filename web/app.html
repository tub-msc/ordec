<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--<link rel="preload" href="/fonts/Inconsolata/Inconsolata-VariableFont_wdth,wght.ttf" as="font" type="font/ttf" crossorigin />-->
    <link rel="icon" type="image/svg+xml" href="/ordec_icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORDeC</title>
  </head>
  <body>
    <div id="toolbar">
      <div class="item"><button class="toolbar-btn" id="newresview">New Result View</button></div>
      <div class="item debug"><button class="toolbar-btn" id="savejson">Save as JSON</button></div>
      <div class="item" id="toolSourcetype">
        <select class="toolbar-btn" name="sourcetype" id="sourcetype">
          <option value="ord">Source: ORD</option>
          <option value="python">Source: Python</option>
        </select>
      </div>
      <div class="item" id="toolRefresh"><button class="toolbar-btn" id="refresh">Refresh</button></div>
      <div class="item"><a class="toolbar-btn" href="/index.html" target="_blank">Examples</a></div>
      <div class="toolbar-divider"></div>
      <div class="spacer"></div>
      <div class="item toolbar-muted">ORDeC&nbsp;<span id="version"></span></div>
      <div class="item status-disconnected" id="status">disconnected</div>
      <button class="toolbar-btn" id="theme-toggle" title="Toggle dark/light mode" aria-label="Toggle dark/light mode"></button>
    </div>
    <div id="workspace"></div>
    <a id="downloadAnchorElem" style="display:none"></a>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
