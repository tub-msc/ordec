version = 1

[[annotations]]
# Auto-generated files:
path = [
    "docs/Makefile",
    "docs/make.bat",
    "web/package-lock.json",
    "tests/renderview_ref/*.svg",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
# Boilerplate files:
path = [
    ".gitignore",
    "docs/.gitignore",
    "web/.gitignore",
    ".dockerignore",
    "MANIFEST.in",
    "docs/requirements.txt",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
# ordec.examples code:
path = [
    "ordec/examples/amp.ord",
    "ordec/examples/blank.ord",
    "ordec/examples/currentmirror.ord",
    "ordec/examples/diffpair.ord",
    "ordec/examples/nand2.ord",
    "ordec/examples/rc_curve.py",
    "ordec/examples/voltagedivider.ord",
    "ordec/examples/voltagedivider_py.py",
    "ordec/examples/stdcells.ord",
    "ordec/examples/*.uistate.json",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
# ordec.courses lesson content:
path = [
    "ordec/courses/intro/*.ord",
    "ordec/courses/intro/*.py",
    "ordec/courses/intro/*.json",
]
SPDX-FileCopyrightText = "2026 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# Basic Jupyter example:
path = [
    "examples/JupyterExample.py",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
# Example GDS:
path = [
    "tests/layout_gds/__init__.py",
    "tests/layout_gds/*.gds",
    "tests/lvsdb/c_hier.lvsdb",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# Example code for development:
path = [
    "examples/dev/*.py",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# File in web/ where inline SPDX data would be messy or impossible:
path = [
    "web/package.json",
    "web/app.html",
    "web/index.html",
    "web/src/style.css",
    "web/src/theme-dark.css",
    "web/src/ace-ord-style.css",
    "web/public/ordec_icon.svg",
    "web/public/ordec_logo.svg",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# Hub login template (HTML served to the browser, so inline SPDX is messy):
path = [
    "hub/templates/login.html",
]
SPDX-FileCopyrightText = "2026 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# Hub logo (copy of web/public/ordec_logo.svg; inline SPDX in SVG is messy):
path = [
    "hub/ordec_logo.svg",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# Documentation files:
path = [
    "README.md",
    "AGENTS.md",
    "CONTRIBUTING.md",
    "tests/renderview_ref/README.md",
    "docs/**/*.rst",
    "docs/**/*.svg",
    "docs/ref/ordb_demo.py",
    "docs/ord_tutorial.py",
    "docs/cell_lib/base.py",
    "docs/screenshot_demo.png",
    "examples/README.md",
    "examples/interactive_rc_circuit/README.md",
]
SPDX-FileCopyrightText = "2025 ORDeC contributors"
SPDX-License-Identifier = "Apache-2.0"
