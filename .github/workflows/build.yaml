name: ordec docker image
on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tub-msc/ordec

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build Docker image for testing
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          load: true
          file: Dockerfile
          tags: ordec-imagetest
          provenance: false
          sbom: false
      # Regression test for the user-facing image: tests.yaml runs pytest in
      # ordec-base, so it cannot detect runtime tools (klayout, ngspice, ...)
      # missing from the ordec image. Run the test suite inside the freshly
      # built image. Web tests are excluded: they need chromium-driver and
      # npm, which are deliberately not part of the user image. Coverage/cache
      # addopts are dropped because the mounted checkout is not writable for
      # the container user.
      - name: Test image
        run: |
          docker run --rm -v "$PWD":/mnt -w /mnt ordec-imagetest sh -xc \
            'pip install --no-cache-dir pytest pillow && pytest -m "not web" -p no:cacheprovider -o addopts="--tb=short"'
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          file: Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
