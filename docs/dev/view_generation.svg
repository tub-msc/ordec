<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="150mm" height="118mm"
     viewBox="0 0 600 472" xml:space="preserve">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666666"/>
    </marker>
  </defs>

  <style>
    .box   { fill: #f2f2f2; stroke: #666666; stroke-width: 1; }
    .inner { fill: #ffffff; stroke: #b3b3b3; stroke-width: 1; }
    .t     { font-family: 'TeX Gyre Heros', Helvetica, Arial, sans-serif;
             font-size: 13px; fill: #000000; }
    .title { font-weight: bold; }
    .sub   { font-size: 11px; fill: #555555; }
    .edge  { stroke: #666666; stroke-width: 1.2; fill: none;
             marker-end: url(#arrow); }
    .lbl   { font-family: 'TeX Gyre Heros', Helvetica, Arial, sans-serif;
             font-size: 11px; fill: #333333; }
    .mono  { font-family: 'DejaVu Sans Mono', monospace; font-size: 11px; }
  </style>

  <!-- Browser -->
  <rect class="box" x="20" y="12" width="560" height="46" rx="3"/>
  <text class="t title" x="34" y="32">Browser — result panel</text>
  <text class="t sub" x="34" y="48">progress bar, cancel button</text>

  <!-- Browser -> handler -->
  <path class="edge" d="M 120 58 L 120 104"/>
  <text class="lbl mono" x="128" y="76">getview(req)</text>
  <text class="lbl mono" x="128" y="90">cancelview(req)</text>

  <!-- handler -> browser -->
  <path class="edge" d="M 480 104 L 480 58"/>
  <text class="lbl mono" x="330" y="76">viewprogress(req) </text>
  <text class="lbl mono" x="330" y="90">view(req) — terminal</text>

  <!-- Connection handler -->
  <rect class="box" x="20" y="104" width="560" height="62" rx="3"/>
  <text class="t title" x="34" y="124">handle_connection — one thread per connection</text>
  <text class="t sub" x="34" y="140">reads messages while views generate, so cancelview can arrive</text>
  <text class="t sub" x="34" y="156">sends every message under websocket_lock</text>

  <!-- handler -> jobrunner -->
  <path class="edge" d="M 120 166 L 120 212"/>
  <text class="lbl mono" x="128" y="184">submit(fn)</text>
  <text class="lbl mono" x="128" y="198">cancel(job)</text>

  <!-- jobrunner -> handler (callbacks) -->
  <path class="edge" d="M 480 212 L 480 166"/>
  <text class="lbl mono" x="352" y="184">on_progress(...)</text>
  <text class="lbl mono" x="352" y="198">on_done(...)</text>

  <!-- JobRunner -->
  <rect class="box" x="20" y="212" width="560" height="74" rx="3"/>
  <text class="t title" x="34" y="232">JobRunner — ordec/jobrunner.py</text>
  <text class="t sub" x="34" y="248">queue + semaphore (-j N): at most N jobs run at once</text>
  <text class="t sub" x="34" y="264">one fresh daemon thread per Job; cancel escalates:</text>
  <text class="t sub" x="34" y="278">flag + kill subprocess → async exception → give up</text>

  <!-- jobrunner -> job thread -->
  <path class="edge" d="M 300 286 L 300 322"/>
  <text class="lbl mono" x="308" y="308">with run.activate(): query_view(...)</text>

  <!-- Job thread / view generator -->
  <rect class="box" x="20" y="322" width="560" height="80" rx="3"/>
  <text class="t title" x="34" y="342">Job thread — the view generator</text>
  <rect class="inner" x="34" y="352" width="240" height="38" rx="3"/>
  <text class="t" x="46" y="368">GenRun (ContextVar)</text>
  <text class="t sub" x="46" y="382">progress() · checkpoint()</text>
  <text class="t sub" x="290" y="368">module-level progress()/checkpoint() find the</text>
  <text class="t sub" x="290" y="382">active run — no argument passing, no-op if unset</text>

  <!-- generator -> ngspice -->
  <path class="edge" d="M 300 402 L 300 438"/>
  <text class="lbl mono" x="308" y="424">cancelable_subprocess(p)</text>

  <!-- ngspice -->
  <rect class="box" x="20" y="438" width="560" height="26" rx="3"/>
  <text class="t" x="34" y="456"><tspan class="title">ngspice_batch</tspan> — rawfile growth gives the fraction; killed on cancel</text>
</svg>
